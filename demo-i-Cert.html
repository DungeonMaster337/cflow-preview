<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>CertFlow AI — персональное демо</title>
<style>
:root{
  --navy:#17324d;--blue:#2f6b9a;--teal:#1f7a73;--bg:#f4f7fa;
  --card:#fff;--line:#dbe3ea;--muted:#64748b;--orange:#e88933;
  --green:#18794e;--red:#b42318;--shadow:0 14px 40px rgba(23,50,77,.10)
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:#17212b}
header{background:linear-gradient(135deg,var(--navy),#244f72);color:white;padding:24px 32px}
.header-inner{max-width:1240px;margin:auto;display:flex;justify-content:space-between;gap:24px;align-items:center}
h1{margin:0;font-size:28px;letter-spacing:-.5px}
.subtitle{margin-top:7px;color:#dbeafe;font-size:15px}
.forco{margin-top:12px;display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);padding:8px 13px;border-radius:10px;font-size:13px}
.forco b{font-weight:800}
.badge{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);padding:9px 13px;border-radius:999px;font-size:13px;white-space:nowrap}
main{max-width:1240px;margin:28px auto;padding:0 22px 50px}
.notice{background:#fff2e5;border:1px solid #f2c89d;border-radius:12px;padding:13px 16px;margin-bottom:18px;font-size:14px}
.grid{display:grid;grid-template-columns:1fr 1.08fr;gap:20px;align-items:start}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.card-head h2{font-size:18px;margin:0}
.card-body{padding:20px}
label{display:block;font-size:13px;font-weight:700;margin-bottom:8px}
textarea,input,select{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:12px;font:inherit;background:white}
textarea{min-height:210px;resize:vertical;line-height:1.5}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.filebox{margin-top:14px;padding:12px;border:1px dashed #94a3b8;border-radius:10px;background:#f8fafc}
.chip{display:inline-block;background:#eaf3f8;color:#244f72;border-radius:999px;padding:7px 10px;margin:4px 6px 0 0;font-size:12px}
button{border:0;border-radius:10px;padding:13px 16px;font-weight:800;cursor:pointer}
.primary{width:100%;margin-top:17px;background:var(--teal);color:#fff;font-size:15px}
.primary:hover{filter:brightness(.95)}
.secondary{background:#eaf3f8;color:var(--navy);padding:8px 11px;font-size:12px}
.small{font-size:12px;color:var(--muted)}
.empty{padding:70px 28px;text-align:center;color:var(--muted)}
.loader{width:34px;height:34px;border:4px solid #dbeafe;border-top-color:var(--blue);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.section{border-bottom:1px solid var(--line);padding:17px 20px}
.section:last-child{border-bottom:0}
.section-title{font-weight:800;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.num{width:24px;height:24px;border-radius:7px;background:#e9f5f3;color:var(--teal);display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.kv{display:grid;grid-template-columns:150px 1fr;gap:7px 14px;font-size:13px}
.kv div:nth-child(odd){color:var(--muted)}
.status{display:inline-flex;align-items:center;gap:6px;background:#fff6dd;color:#7a4b00;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:700}
.dot{width:7px;height:7px;border-radius:50%;background:#e9a23b}
.questions{margin:0;padding-left:20px;font-size:13px;line-height:1.5}
.questions li{margin:7px 0}
.route{background:#f7fafc;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13px;line-height:1.48}
.route strong{color:var(--navy)}
.price-table{width:100%;border-collapse:collapse;font-size:13px}
.price-table td{padding:8px 4px;border-bottom:1px solid #edf2f7}
.price-table td:last-child{text-align:right;font-weight:700}
.total td{font-size:15px;border-bottom:0;padding-top:12px}
.draft{background:#e9f5f3;border:1px solid #bcded8;border-radius:10px;padding:13px;font-size:13px;line-height:1.55;white-space:pre-line}
.footer-note{padding:14px 20px;background:#f8fafc;color:var(--muted);font-size:12px}
.configerr{max-width:1240px;margin:20px auto;padding:16px;background:#fdecea;border:1px solid #f0b4ab;border-radius:12px;color:#8a2318;font-size:14px}
@media(max-width:850px){.grid{grid-template-columns:1fr}.header-inner{align-items:flex-start;flex-direction:column}.row{grid-template-columns:1fr}.kv{grid-template-columns:120px 1fr}}
</style>
</head>
<body>
<script>

  // --- 3. ЛИЦЕНЗИРОВАНИЕ И ПРОМБЕЗОПАСНОСТЬ -----------------------------------
  licensing: {
    brand:'LicenseFlow AI',
    tagline:'Карта готовности к лицензии и черновик КП',
    forCompany:'i-Cert',                 // ← напр. 'Бона Фиде'

// >>> ВЫБОР СЕГМЕНТА ДЛЯ ЭТОГО ДЕМО <<<
const ACTIVE = PRESETS.certification;
</script>

<div id="app"></div>

<script>
/* --- рендер из ACTIVE. Не редактируется при перекраске под лида. --- */
const REQUIRED = ['brand','tagline','request','card','questions','routeText','priceRows','priceTotal','draft'];

function fail(msg){
  document.body.innerHTML =
    '<div class="configerr"><b>Ошибка конфигурации демо:</b> '+msg+
    '<br>Проверь блок PRESETS / ACTIVE вверху файла.</div>';
  throw new Error(msg);
}
function validate(c){
  if(!c) fail('ACTIVE не задан.');
  const miss = REQUIRED.filter(k => c[k]===undefined || c[k]===null);
  if(miss.length) fail('в пресете нет полей: '+miss.join(', ')+'.');
  if(!Array.isArray(c.card)||!c.card.every(r=>Array.isArray(r)&&r.length===2)) fail('card — массив пар [название, значение].');
  if(!Array.isArray(c.priceRows)) fail('priceRows — массив пар.');
}
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function render(c){
  validate(c);
  const forco = c.forCompany
    ? '<div class="forco">Персональный макет для: <b>'+esc(c.forCompany)+'</b></div>'
    : '<div class="forco small" style="opacity:.75">⚠ Впиши forCompany в пресете — имя лида должно быть на первом экране</div>';
  const kv = c.card.map(([k,v])=>'<div>'+esc(k)+'</div><div><strong>'+esc(v)+'</strong></div>').join('');
  const qs = c.questions.map(q=>'<li>'+esc(q)+'</li>').join('');
  const rows = c.priceRows.map(([k,v])=>'<tr><td>'+esc(k)+'</td><td>'+esc(v)+'</td></tr>').join('');
  const resp = (c.responsibles||['Менеджер']).map(r=>'<option>'+esc(r)+'</option>').join('');
  const files = (c.attachments||[]).map(f=>'<span class="chip">'+esc(f)+'</span>').join('');

  document.getElementById('app').innerHTML = `
<header><div class="header-inner">
  <div><h1>${esc(c.brand)}</h1><div class="subtitle">${esc(c.tagline)}</div>${forco}</div>
  <div class="badge">${esc(c.badge||'Эксперт подтверждает результат')}</div>
</div></header>
<main>
  <div class="notice"><strong>Интерактивный макет:</strong> экран и результат показывают будущий сценарий продукта. В этой версии логика смоделирована на одном примере и не подключена к реальной нейросети или базе цен.</div>
  <div class="grid">
    <section class="card">
      <div class="card-head"><h2>Новая заявка</h2><span class="small">Входящие № ${esc(c.incomingNo||'00001')}</span></div>
      <div class="card-body">
        <label>Текст письма или сообщения клиента</label>
        <textarea>${esc(c.request)}</textarea>
        <div class="row">
          <div><label>Источник</label><select><option>Email</option><option>Форма сайта</option><option>Telegram</option><option>WhatsApp</option></select></div>
          <div><label>Ответственный</label><select>${resp}</select></div>
        </div>
        ${files?`<div class="filebox"><strong style="font-size:13px">Вложения</strong><br>${files}</div>`:''}
        <button class="primary" id="analyze">Разобрать заявку и подготовить результат</button>
        <p class="small">Обычно менеджер проверяет результат, задаёт недостающие вопросы и только затем отправляет клиенту.</p>
      </div>
    </section>
    <section class="card">
      <div class="card-head"><h2>Результат обработки</h2><button class="secondary hidden" id="copyBtn">Скопировать ответ</button></div>
      <div id="empty" class="empty"><div style="font-size:34px;margin-bottom:10px">↗</div>Нажмите кнопку слева, чтобы увидеть карточку заявки, вопросы, предварительный маршрут и черновик ответа.</div>
      <div id="loading" class="empty hidden"><div class="loader"></div>${esc(c.loadingText||'Извлекаю данные из письма и файлов…')}</div>
      <div id="result" class="hidden">
        <div class="section">
          <div class="section-title"><span class="num">1</span> Карточка заявки <span class="status"><span class="dot"></span> ${esc(c.statusLabel||'Нужны уточнения')}</span></div>
          <div class="kv">${kv}</div>
        </div>
        <div class="section">
          <div class="section-title"><span class="num">2</span> Недостающие вопросы</div>
          <ol class="questions">${qs}</ol>
        </div>
        <div class="section">
          <div class="section-title"><span class="num">3</span> Предварительный маршрут</div>
          <div class="route">${c.routeText}</div>
        </div>
        <div class="section">
          <div class="section-title"><span class="num">4</span> Ориентировочный расчёт</div>
          <table class="price-table">${rows}<tr class="total"><td><strong>${esc(c.priceTotal[0])}</strong></td><td><strong>${esc(c.priceTotal[1])}</strong></td></tr></table>
          <div class="small">Демонстрационные числа. Финальная цена только из прайса компании после подтверждения экспертом.</div>
        </div>
        <div class="section">
          <div class="section-title"><span class="num">5</span> Черновик ответа клиенту</div>
          <div class="draft" id="draftText">${esc(c.draft)}</div>
        </div>
        <div class="footer-note">Следующий шаг в рабочей версии: «Отправить вопросы», «Подтвердить маршрут», «Создать КП PDF», «Передать в CRM».</div>
      </div>
    </section>
  </div>
</main>`;

  const analyze=document.getElementById('analyze'),empty=document.getElementById('empty'),
        loading=document.getElementById('loading'),result=document.getElementById('result'),
        copyBtn=document.getElementById('copyBtn');
  analyze.addEventListener('click',()=>{
    empty.classList.add('hidden');result.classList.add('hidden');copyBtn.classList.add('hidden');
    loading.classList.remove('hidden');analyze.disabled=true;analyze.textContent='Обработка…';
    setTimeout(()=>{loading.classList.add('hidden');result.classList.remove('hidden');
      copyBtn.classList.remove('hidden');analyze.disabled=false;analyze.textContent='Разобрать повторно';},1100);
  });
  copyBtn.addEventListener('click',async()=>{
    try{await navigator.clipboard.writeText(document.getElementById('draftText').innerText);
      copyBtn.textContent='Скопировано';setTimeout(()=>copyBtn.textContent='Скопировать ответ',1200);}catch(e){}
  });
}
render(ACTIVE);

/* самопроверка: сломанный пресет должен ловиться до показа. Открой ?selftest=1 */
if(location.search.includes('selftest')){
  const t=(name,fn)=>{try{fn();console.error('FAIL '+name+': не бросило');}catch(e){console.log('OK '+name);}};
  t('нет обязательного поля',()=>validate({brand:'x'}));
  t('битый card',()=>validate({...ACTIVE,card:[['одно']]}));
  console.log('selftest done — валидный ACTIVE рисуется выше');
}
</script>
</body>
</html>
